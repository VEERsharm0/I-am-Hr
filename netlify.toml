[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api.onrender.com/api/:splat" # REPLACE with your backend URL
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://your-backend-api.onrender.com/uploads/:splat" # REPLACE with your backend URL
  status = 200
  force = true

# The SPA catch-all rule (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200